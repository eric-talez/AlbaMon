# CI gate: every pull request and every push to main must pass all steps
# below before merging/releasing. No secrets are required — typecheck, lint,
# tests, and `next build` all run in the same "Supabase unconfigured"
# mode as a fresh local checkout (mock/dev fallbacks, no live services).
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded runs on PR branches, but let pushes to main finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Whitespace, typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Next.js build cache, per node_modules/next/dist/docs CI guide.
      # Keyed so source changes rebuild from the closest prior cache.
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      # Diffing HEAD against git's empty tree makes `git diff --check` scan
      # every tracked text file for whitespace errors (trailing whitespace,
      # space-before-tab, blank lines at EOF), not just uncommitted changes.
      - name: Whitespace check
        run: git diff --check "$(git hash-object -t tree /dev/null)" HEAD

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # Separate browser-E2E gate (Slice 30). Runs only after the unit/build job
  # succeeds, and — like it — needs no secrets: the Playwright webServer runs
  # `next dev` in dev-auth mode with placeholder Supabase env (mock jobs, no
  # database, no network services). See playwright.config.ts.
  e2e:
    name: Browser E2E (Playwright, Chromium)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Only the Chromium build pinned to @playwright/test (package-lock.json),
      # plus its OS dependencies — no other browsers are downloaded.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser E2E
        run: npm run test:e2e

      # Report + traces are retained on failure only (see playwright.config.ts).
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
